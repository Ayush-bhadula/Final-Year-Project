<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Signup.css">
    <title>MeetScribe - Signup</title>
</head>

<body>
    <div class="Signup-Container">

        <div class="Signup">
            <h1>Sign Up</h1>

        </div>
        <div class="para">
            <p>Create Your Account</p>
        </div>
        <div class="input-credentials">
            <input type="text" id="name" class="inputs" placeholder="Full Name">
            <input type="email" id="email" class="inputs" placeholder="Email Address">
            <input type="text" id="username" class="inputs" placeholder="Username">
            <input type="password" id="password" class="inputs" placeholder="Password">
            <input type="password" id="confirmpassword" class="inputs" placeholder="Confirm Password">


        </div>
        <div class="Country">
            <!-- <label for="Country">Select Country</label> -->
            <select name="country" class="inputs" id="countries">
                <option aria-placeholder="Select Country" value="country" id="country" class="inputs"> 
                    
                </option>
            </select>


        </div>

        <div class="signup-btn">
            <button id="signupBtn">Sign Up</button>
        </div>
        <div class="divider">
            <span>OR</span>
        </div>
        <div class="login-redirect">
            <p>Already have an account ? <a href="User_Authentication.html">Sign In</a></p>
        </div>



    </div>

    <script src="Signup.js"></script>
</body>
</html>
